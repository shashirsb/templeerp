module.exports = "<div class=\"modal-header\">\n  <h4 class=\"modal-title\" id=\"modal-basic-title\">Website Album Details</h4>\n  <button type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"closeModal()\">\n    <span aria-hidden=\"true\">&times;</span>\n  </button>\n</div>\n\n<div class=\"modal-body\">\n\n  <form>\n\n    <div style=\"margin-bottom:25px;width:100%\">\n      <img *ngFor=\"let img of modelData.imageUrl\" width=\"100px\" [src]=\"img\" alt=\"\">&nbsp;&nbsp;\n    </div>\n    <div class=\"form-group row\">\n      <label class=\"col-sm-2 col-form-label\">Id</label>\n      <div class=\"col-4\">\n        <label class=\"col-form-label\">\n          <b>: {{modelData.websiteAlbumId}}</b>\n        </label>\n      </div>\n    </div>\n\n\n\n\n    <div class=\"form-group row\">\n      <label for=\"\" class=\"col-sm-2 col-form-label\">Album Name</label>\n      <div class=\"col-4\">\n        <label class=\"col-form-label\">\n          <b>: {{modelData.albumName}}</b>\n        </label>\n      </div>\n    </div>\n\n    <div class=\"form-group row\">\n      <label for=\"\" class=\"col-sm-2 col-form-label\">Ticker Master Name</label>\n      <div class=\"col-4\">\n        <label class=\"col-form-label\">\n          <b>: {{modelData.bookingPersonName}}</b>\n        </label>\n      </div>\n    </div>\n\n\n  </form>\n\n</div>\n\n\n"
