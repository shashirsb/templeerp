module.exports = "<div class=\"row\">\n  <div class=\"col-12\">\n    <div class=\"float-left\">\n      <select [(ngModel)]=\"selectedItem\" class=\"form-control\" (change)=\"onChangeItemPerPage($event.target.value)\" id=\"selectPageCount\">\n        <option *ngFor=\"let item of itemPerPageList;let i = index;\"> {{item}} </option>\n      </select>\n    </div>\n    <div class=\"float-right\">\n      <ul class=\"pagination\" *ngIf=\"totalItems > 0\">\n        <li class=\"page-item\" [class.disabled]=\"currentPage == 1\">\n          <a (click)=\"onPreClick()\" href=\"javascript:void(0)\" class=\"page-link\">\n            <i class=\"fa fa-arrow-left\" aria-hidden=\"true\"></i>\n          </a>\n        </li>\n        <li class=\"page-item\" *ngFor=\"let pNumber of getDisplayPages();\" [ngClass]=\"{'active': pNumber == currentPage}\">\n          <a (click)=\"onSelectPage(pNumber)\" href=\"javascript:void(0)\" class=\"page-link\">{{pNumber}}</a>\n        </li>\n        <li class=\"page-item\" [class.disabled]=\"lastPage()\">\n          <a (click)=\"onNextClick()\" href=\"javascript:void(0)\" class=\"page-link\">\n            <i class=\"fa fa-arrow-right\" aria-hidden=\"true\"></i>\n          </a>\n        </li>\n      </ul>\n    </div>\n  </div>\n</div>\n"
