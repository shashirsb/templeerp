module.exports = "<div class=\"app-title\">\n  <div>\n    <h1>\n      <i class=\"fa fa-book\"></i> Seva</h1>\n  </div>\n  <ul class=\"app-breadcrumb breadcrumb\">\n    <li class=\"breadcrumb-item\">\n      <i class=\"fa fa-home fa-lg\"></i>\n    </li>\n    <li class=\"breadcrumb-item\">\n      <a routerLink=\"/admin/dashboard\">Dashboard</a>\n    </li>\n  </ul>\n</div>\n\n\n<div class=\"tile mb-4\">\n  <div class=\"page-header\">\n    <div class=\"row\">\n      <div class=\"col-lg-12\">\n        <h5 class=\"mb-3 line-head\" id=\"buttons\">Add Seva Type</h5>\n      </div>\n    </div>\n  </div>\n  <div class=\"row\">\n    <div class=\"col-12\">\n\n      <form class=\"form-horizontal\" [formGroup]=\"sevaTypeForm\" (ngSubmit)=\"onSubmitForm()\">\n        <div class=\"form-group row\">\n          <label for=\"\" class=\"control-label col-md-2\">Title</label>\n          <div class=\"col-md-4\">\n            <input type=\"text\" formControlName=\"title\" name=\"title\" id=\"title\" class=\"form-control\" placeholder=\"Title\">\n            <em *ngIf=\"title.invalid && (title.dirty || title.touched)\" class=\"error\">\n              <span *ngIf=\"title.errors.required\">\n                {{vm.Required}}\n              </span>\n            </em>\n          </div>\n        </div>\n\n        <div class=\"form-group row\">\n          <label for=\"\" class=\"control-label col-md-2\">Price</label>\n          <div class=\"col-md-4\">\n            <input type=\"text\" formControlName=\"price\" name=\"price\" id=\"price\" class=\"form-control\" placeholder=\"Price\">\n          </div>\n        </div>\n\n        <div class=\"form-group row\">\n          <label for=\"\" class=\"control-label col-md-2\">Allowed Person P/H</label>\n          <div class=\"col-md-4\">\n            <input type=\"text\" formControlName=\"allowed\" name=\"allowed\" id=\"allowed\" class=\"form-control\" placeholder=\"Allowed\">\n          </div>\n        </div>\n\n        <div class=\"form-group row\">\n          <label for=\"\" class=\"control-label col-md-2\">Description</label>\n          <div class=\"col-md-4\">\n            <textarea formControlName=\"description\" name=\"description\" id=\"description\" rows=\"4\" class=\"form-control\" placeholder=\"Description\"></textarea>\n          </div>\n        </div>\n\n        <div class=\"form-group btn-container\">\n          <hr>\n          <button class=\"btn btn-primary \">\n            <i class=\"fa fa-sign-in fa-lg fa-fw\"></i>Add Seva Type</button>\n\n        </div>\n      </form>\n\n    </div>\n  </div>\n</div>\n"
