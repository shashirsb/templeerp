module.exports = "<div class=\"modal-header\">\n  <h4 class=\"modal-title\" id=\"modal-basic-title\">Add New Folder</h4>\n  <button type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"closeModal()\">\n    <span aria-hidden=\"true\">&times;</span>\n  </button>\n</div>\n\n<div class=\"modal-body\">\n\n  <form class=\"login-form\" [formGroup]=\"cardForm\" (ngSubmit)=\"onSubmitForm()\">\n    <div class=\"form-group\">\n      <input formControlName=\"cardName\" type=\"text\" class=\"form-control\" id=\"cardName\" name=\"cardName\" placeholder=\"Card Name\" autofocus>\n      <em *ngIf=\"cardName.invalid && (cardName.dirty || cardName.touched)\" class=\"error\">\n        <span *ngIf=\"cardName.errors.required\">\n          This Field is required\n        </span>\n      </em>\n    </div>\n    <div class=\"form-group\">\n      <input formControlName=\"cardFrontData\" type=\"text\" class=\"form-control\" id=\"cardFrontData\" name=\"cardFrontData\" placeholder=\"Card Front Data\" autofocus>\n\n    </div>\n    <div class=\"form-group\">\n      <input formControlName=\"cardBackData\" type=\"text\" class=\"form-control\" id=\"cardBackData\" name=\"cardBackData\" placeholder=\"Card back Data\" autofocus>\n\n    </div>\n\n    <div class=\"form-group btn-container\">\n      <hr>\n      <button class=\"btn btn-primary \">\n        <i class=\"fa fa-sign-in fa-lg fa-fw\"></i>Add</button>\n\n    </div>\n  </form>\n\n</div>\n\n<!-- <div class=\"modal-footer\">\n  <button type=\"button\" class=\"btn btn-outline-dark\" (click)=\"c('Save click')\">Save</button>\n</div> -->\n"
