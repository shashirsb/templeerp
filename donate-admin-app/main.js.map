module.exports = "<div class=\"app-title\">\n  <div>\n    <h1>\n      <i class=\"fa fa-dashboard\"></i> Folders</h1>\n    <p>My Folders</p>\n  </div>\n  <ul class=\"app-breadcrumb breadcrumb\">\n    <li class=\"breadcrumb-item\">\n      <i class=\"fa fa-home fa-lg\"></i>\n    </li>\n    <li class=\"breadcrumb-item\">\n      <a routerLink=\"/admin/dashboard\">Dashboard</a>\n    </li>\n  </ul>\n</div>\n\n\n<!-- Buttons-->\n<div class=\"tile mb-4\">\n  <div class=\"page-header\">\n    <div class=\"row\">\n      <div class=\"col-lg-12\">\n        <button class=\"btn btn-primary btn-sm pull-right\" (click)=\"onCreateCard()\">\n          <i class=\"fa fa-plus\" aria-hidden=\"true\"></i>\n          Add New Card\n        </button>\n        <h5 class=\"mb-3 line-head\" id=\"buttons\">My Folders / my data </h5>\n      </div>\n    </div>\n  </div>\n  <div class=\"row\">\n    <div class=\"col-md-3\" *ngFor=\"let item of cardsList;let i=index;\">\n\n      <div class=\"card text-white bg-primary mb-3\" style=\"max-width: 18rem;height: 14rem; overflow: hidden;\">\n        <div class=\"card-header\">\n          <button type=\"button\" class=\"close\" (click)=\"onDeleteConfirm(item);\">\n            <i class=\"fa fa-trash\" aria-hidden=\"true\"></i>\n          </button>\n          <button type=\"button\" class=\"close\" (click)=\"onEditCard(item);\" style=\"margin-right:10px;\">\n            <i class=\"fa fa-edit\" aria-hidden=\"true\"></i>\n          </button>\n        </div>\n        <div class=\"card-body\">\n\n          <p class=\"card-text text-truncate\">{{item.cardFrontData}}</p>\n        </div>\n      </div>\n    </div>\n\n  </div>\n</div>\n"
