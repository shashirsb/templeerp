module.exports = "<div style=\"min-height:200px;padding:25px;\">\n  <input type=\"file\" #file style=\"display: none;\" (change)=\"onFilesAdded()\" multiple />\n  <h1>Upload Files</h1>\n  <div>\n    <button [disabled]=\"uploading || uploadSuccessful\" color=\"primary\" (click)=\"addFiles()\">\n      Add Files\n    </button>\n\n    <div *ngFor=\"let file of files\">\n      <h4 mat-line>{{file.name}}</h4>\n      <progress-bar *ngIf=\"progress\" [progress]=\"progress[file.name].progress | async\" [color]=\"'#488aff'\">\n      </progress-bar>\n    </div>\n    <button *ngIf=\"showCancelButton\" (click)=\"closeModal()\" >Cancel</button>\n    <button (click)=\"closeDialog()\">{{primaryButtonText}}</button>\n  </div>\n</div>"
