module.exports = "<div class=\"modal-header\">\n    <h4 *ngIf=\"isFrontSide\" class=\"modal-title\" id=\"modal-basic-title\">Front Side</h4>\n    <h4 *ngIf=\"!isFrontSide\" class=\"modal-title\" id=\"modal-basic-title\">Back Side</h4>\n    <button type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"isFrontSide=!isFrontSide\" style=\"float: left;\">\n        <i *ngIf=\"isFrontSide\" class=\"fa fa-arrow-up\"></i>\n        <i *ngIf=\"!isFrontSide\" class=\"fa fa-arrow-down\"></i>\n    </button>\n  </div>\n<div class=\"modal-body\">\n\n  <form class=\"login-form\" [formGroup]=\"cardForm\" (ngSubmit)=\"onSubmitForm()\">\n\n    <div class=\"form-group\" *ngIf=\"isFrontSide\">\n        <textarea *ngIf=\"!isEditMode\" class=\"form-control\"  formControlName=\"cardFrontData\" name=\"cardFrontData\" id=\"cardFrontData\" cols=\"30\" rows=\"5\"></textarea>\n      <span *ngIf=\"isEditMode\" autofocus>{{cardFrontData.value}}</span>\n    </div>\n    <div class=\"form-group\" *ngIf=\"!isFrontSide\">\n        <textarea *ngIf=\"!isEditMode\" class=\"form-control\"  formControlName=\"cardBackData\" name=\"cardBackData\" id=\"cardBackData\" cols=\"30\" rows=\"5\"></textarea>\n        <span *ngIf=\"isEditMode\">{{cardBackData.value}}</span>\n    </div>\n\n    <div class=\"form-group btn-container\">\n      <hr>\n      <button *ngIf=\"!isEditMode\" class=\"btn btn-primary \">\n        <i class=\"fa fa-edit fa-lg fa-fw\"></i>Update</button>\n      <button *ngIf=\"!isEditMode\" class=\"btn btn-primary\" type=\"button\" (click)=\"isEditMode=!isEditMode\">\n        <i class=\"fa fa-edit fa-lg fa-fw\"></i>Cancel</button>\n\n        <button *ngIf=\"isEditMode\" class=\"btn btn-primary\" type=\"button\" (click)=\"isEditMode=!isEditMode\">\n            <i class=\"fa fa-edit fa-lg fa-fw\"></i>Edit</button>\n            <button *ngIf=\"isEditMode\" class=\"btn btn-primary\" type=\"button\" (click)=\"closeModal()\">\n                <i class=\"fa fa-edit fa-lg fa-fw\"></i>Close</button>\n\n    </div>\n  </form>\n\n</div>\n\n<!-- <div class=\"modal-footer\">\n    <button type=\"button\" class=\"btn btn-outline-dark\" (click)=\"c('Save click')\">Save</button>\n  </div> -->\n"
