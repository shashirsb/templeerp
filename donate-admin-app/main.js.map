module.exports = "<div class=\"modal-header\">\n    <h4 class=\"modal-title\" id=\"modal-basic-title\">Confirm</h4>\n    <button type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"closeModal()\">\n      <span aria-hidden=\"true\">&times;</span>\n    </button>\n  </div>\n\n  <div class=\"modal-body\">\n    <p style=\"color: #343a40\">{{modelData.message}}</p>\n  </div>\n\n  <div class=\"modal-footer\">\n    <button type=\"button\" class=\"btn btn-danger\" (click)=\"onConfirmDelete()\">Yes</button>\n    <button type=\"button\" class=\"btn btn-default\" (click)=\"closeModal()\">No</button>\n  </div>\n"
